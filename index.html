<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Station Mathieu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

<h1>Station Mathieu</h1>

<button id="gpsButton">
📍
</button>

</header>

<section class="search">

<input
id="citySearch"
type="text"
placeholder="Rechercher une ville...">

<button id="favoriteButton">

⭐

</button>

</section>

<main>

<section class="weather-card">

<h2 id="cityName">

Ma position

</h2>

<div class="temperature">

<span id="temperature">

--°

</span>

</div>

<div id="description">

Chargement...

</div>

<div class="weather-grid">

<div class="weather-item">

<div class="label">

💧 Humidité

</div>

<div
class="value"
id="humidity">

--

</div>

</div>

<div class="weather-item">

<div class="label">

🌬 Vent

</div>

<div
class="value"
id="wind">

--

</div>

</div>

<div class="weather-item">

<div class="label">

🧭 Direction

</div>

<div
class="value"
id="windDirection">

--

</div>

</div>

<div class="weather-item">

<div class="label">

📈 Pression

</div>

<div
class="value"
id="pressure">

--

</div>

</div>

</div>

</section>

<section class="forecast-card">

<h2>

6 prochaines heures

</h2>

<div
id="hourlyForecast"
class="forecast-scroll">

</div>

</section>

<section class="forecast-card">

<h2>

Cartes météo

</h2>

<div class="map-list">

<button class="mapButton">

🌧 Radar Europe

</button>

<button class="mapButton">

⚡ Impact Orages

</button>

<button class="mapButton">

💨 Animation Vent

</button>

<button class="mapButton">

🌩 Activité électrique

</button>

</div>

</section>

<section class="forecast-card">

<h2>

Favoris

</h2>

<div id="favorites">

Aucun favori.

</div>

</section>

</main>

<nav class="bottomNav">

<button>

🏠

Accueil

</button>

<button>

🛰

Cartes

</button>

<button>

⭐

Favoris

</button>

<button>

⚙️

Réglages

</button>

</nav>

<script src="app.js"></script>

</body>

</html>
