<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Station Mathieu</title>

<meta name="theme-color" content="#2F80ED">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

    <div class="logo">

        <div class="logo-icon">☀️</div>

        <div>

            <h1>Station Mathieu</h1>

            <span class="subtitle">
                Powered by Open-Meteo
            </span>

        </div>

    </div>

    <button id="gpsButton" class="iconButton">
        📍
    </button>

</header>

<section class="searchBar">

    <input
        id="citySearch"
        type="text"
        placeholder="Rechercher une ville...">

    <button
        id="favoriteButton"
        class="favoriteButton">

        ⭐

    </button>

</section>

<div id="searchResults"></div>

<main>

<section class="weatherCard">

    <div class="weatherHeader">

        <div>

            <h2 id="cityName">

                Ma position

            </h2>

            <p id="lastUpdate">

                Mise à jour...

            </p>

        </div>

        <div id="weatherIcon">

            ☀️

        </div>

    </div>

    <div
        class="temperature"
        id="temperature">

        --°

    </div>

    <div
        id="description"
        class="description">

        Chargement...

    </div>

    <div class="weatherGrid">

        <div class="infoCard">

            <div class="infoLabel">

                💧 Humidité

            </div>

            <div
                id="humidity"
                class="infoValue">

                --

            </div>

        </div>

        <div class="infoCard">

            <div class="infoLabel">

                🌬 Vent

            </div>

            <div
                id="wind"
                class="infoValue">

                --

            </div>

        </div>

        <div class="infoCard">

            <div class="infoLabel">

                🧭 Direction

            </div>

            <div
                id="windDirection"
                class="infoValue">

                --

            </div>

        </div>

        <div class="infoCard">

            <div class="infoLabel">

                📈 Pression

            </div>

            <div
                id="pressure"
                class="infoValue">

                --

            </div>

        </div>

    </div>

</section>

<section class="forecastCard">

<h2>

🕕 Les 6 prochaines heures

</h2>

<div
id="hourlyForecast"
class="hourlyForecast">

</div>

</section>

<section class="forecastCard">

<h2>

📅 Prévisions 7 jours

</h2>

<div
id="dailyForecast">

</div>

</section>

<section class="forecastCard">

<h2>

⭐ Favoris

</h2>

<div
id="favorites">

Aucun favori.

</div>

</section>

<!-- CONTINUE DANS LA PARTIE 2 --><section class="forecastCard">

<h2>

🛰 Cartes météo

</h2>

<div class="mapsGrid">

<button class="mapCard" onclick="openMap('radar')">

🌧️

<span>Radar Europe</span>

</button>

<button class="mapCard" onclick="openMap('wind')">

💨

<span>Vent</span>

</button>

<button class="mapCard" onclick="openMap('storm')">

⛈️

<span>Orages</span>

</button>

<button class="mapCard" onclick="openMap('lightning')">

⚡

<span>Foudre</span>

</button>

</div>

</section>

</main>

<div id="mapModal" class="mapModal">

<div class="mapHeader">

<h2 id="mapTitle">

Carte météo

</h2>

<button onclick="closeMap()">

✕

</button>

</div>

<div class="mapContent">

<iframe
id="mapFrame"
src=""
loading="lazy"
allowfullscreen>

</iframe>

</div>

</div>

<nav class="bottomBar">

<button class="active">

🏠

Accueil

</button>

<button onclick="document.querySelector('.mapsGrid').scrollIntoView({behavior:'smooth'})">

🛰

Cartes

</button>

<button onclick="document.getElementById('favorites').scrollIntoView({behavior:'smooth'})">

⭐

Favoris

</button>

<button>

⚙️

Réglages

</button>

</nav>

<script src="app.js"></script>

</body>

</html>
