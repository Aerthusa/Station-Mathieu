<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Station Mathieu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#eef3f8;
color:#223344;
}

header{
background:white;
padding:20px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
position:sticky;
top:0;
}

input{
width:100%;
padding:15px;
font-size:17px;
border-radius:12px;
border:1px solid #ddd;
box-sizing:border-box;
}

.card{
margin:15px;
background:white;
border-radius:18px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.temp{
font-size:60px;
font-weight:700;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.value{
font-size:24px;
font-weight:600;
}

.small{
color:#666;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
background:#2f80ed;
color:white;
font-size:17px;
border-radius:12px;
}

iframe{
width:100%;
height:400px;
border:none;
border-radius:15px;
margin-top:15px;
}

</style>

</head>

<body>

<header>

<h2>Station Mathieu</h2>

<input
placeholder="Rechercher une ville...">

</header>

<div class="card">

<div id="city">
📍 Ma position
</div>

<div class="temp" id="temp">
--
</div>

<div class="grid">

<div>
<div class="small">Humidité</div>
<div class="value" id="humidity">--</div>
</div>

<div>
<div class="small">Vent</div>
<div class="value" id="wind">--</div>
</div>

<div>
<div class="small">Direction</div>
<div class="value" id="direction">--</div>
</div>

<div>
<div class="small">Pression</div>
<div class="value" id="pressure">--</div>
</div>

</div>

</div>

<div class="card">

<h3>Radar Europe</h3>

<p>Version suivante : intégration RainViewer/Meteoblue.</p>

</div>

<script>

navigator.geolocation.getCurrentPosition(async(position)=>{

let lat=position.coords.latitude;
let lon=position.coords.longitude;

let url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,wind_direction_10m`;

let response=await fetch(url);

let data=await response.json();

document.getElementById("temp").innerHTML=data.current.temperature_2m+"°C";

document.getElementById("humidity").innerHTML=data.current.relative_humidity_2m+" %";

document.getElementById("wind").innerHTML=data.current.wind_speed_10m+" km/h";

document.getElementById("direction").innerHTML=data.current.wind_direction_10m+"°";

document.getElementById("pressure").innerHTML=Math.round(data.current.surface_pressure)+" hPa";

});

</script>

</body>

</html>
